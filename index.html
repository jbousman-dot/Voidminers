  bg.querySelector('#forge-confirm').addEventListener('click', () => {
    bg.remove();
    finalizeAscend(ascendGainAmount, [...selected]);
  });
}

function startingOre() { return 25 * (state.meta.start || 0) + achievementBonus('starting_ore'); }

// ===== BUYING =====
function buyMiner(id) {
  const m = MINERS.find(x => x.id === id);
  const count = buyAmount === 'max' ? maxAffordable(minerCost, m, state.miners[id], state.ore) : buyAmount;
  let bought = 0;
  for (let i = 0; i < count; i++) {
    const cost = minerCost(m, state.miners[id]);
    if (state.ore < cost) break;
    state.ore -= cost; state.miners[id]++; bought++;
  }
  if (bought > 0) navigator.vibrate?.(20);
  return bought > 0;
}
function buyWeapon(id) {
  const w = WEAPONS.find(x => x.id === id);
  if (!weaponUnlocked(w)) return false;
  const count = buyAmount === 'max' ? maxAffordable(weaponCost, w, state.weapons[id], state.ore) : buyAmount;
  let bought = 0;
  for (let i = 0; i < count; i++) {
    const cost = weaponCost(w, state.weapons[id]);
    if (state.ore < cost) break;
    state.ore -= cost; state.weapons[id]++; bought++;
  }
  if (bought > 0) navigator.vibrate?.(20);
  return bought > 0;
}

// ===== AUTO-BUY =====
function autoBuyTick(dt) {
  state.autoBuyAcc += dt;
  const autoMult = hasModifier('mfAuto') ? 0.667 : 1;
  const speed = autoMult / (1 + bonusFromResearch('autoSpeed'));
  while (state.autoBuyAcc >= speed) {
    state.autoBuyAcc -= speed;
    let bought = false;
    if (state.autos.buyMiners && era() >= 1) bought = autoBuyOne('miner') || bought;
    if (state.autos.buyWeapons && era() >= 2) bought = autoBuyOne('weapon') || bought;
    if (!bought) break;
  }
}
function autoBuyOne(kind) {
  const items = kind === 'miner' ? MINERS : WEAPONS;
  const owned = kind === 'miner' ? state.miners : state.weapons;
  const strategy = kind === 'miner' ? state.autos.buyMinersStrategy : state.autos.buyWeaponsStrategy;
  const costFn = kind === 'miner' ? minerCost : weaponCost;
  const valueFn = (it) => kind === 'miner' ? it.rate : it.dps;
  let candidates = items.filter(it => {
    if (kind === 'weapon' && !weaponUnlocked(it)) return false;
    return state.ore >= costFn(it, owned[it.id]);
  });
  if (kind === 'miner') {
    candidates = candidates.filter(it => {
      const idx = MINERS.indexOf(it);
      if (idx === 0) return true;
      return state.miners[MINERS[idx-1].id] > 0 || state.totalOre >= it.base / 2;
    });
  }
  if (candidates.length === 0) return false;
  let pick;
  if (strategy === 'cheap') pick = candidates.reduce((a, b) => costFn(a, owned[a.id]) < costFn(b, owned[b.id]) ? a : b);
  else if (strategy === 'efficient') pick = candidates.reduce((a, b) => valueFn(a) / costFn(a, owned[a.id]) > valueFn(b) / costFn(b, owned[b.id]) ? a : b);
  else pick = candidates.reduce((a, b) => items.indexOf(a) > items.indexOf(b) ? a : b);
  state.ore -= costFn(pick, owned[pick.id]); owned[pick.id]++;
  state.autoBoughtCounts[kind === 'miner' ? 'miners' : 'weapons']++;
  return true;
}

function autoPrestigeTick() {
  if (state.autos.refine && era() >= 2 && refineGain() > 0) doRefine();
  if (state.autos.warp && era() >= 3 && warpGain() > 0) doWarp();
  if (state.autos.ascend && era() >= 4 && ascendGain() > 0) finalizeAscend(ascendGain(), state.forgeModifiers);
}

// ===== EXPEDITIONS =====
function startExpedition(id) {
  const e = EXPEDITIONS.find(x => x.id === id);
  if (!e || state.expeditions[id]?.active) return;
  if (state.miners.drone < e.minerCost) {
    toast('NEED ' + e.minerCost + ' SCOUT DRONES', 'bad'); return;
  }
  state.expeditions[id] = {
    active: true, startTime: Date.now(), duration: expDuration(e) * 1000, minerCost: e.minerCost
  };
  toast(`Expedition launched: ${e.name}`, 'green');
  render();
}
function checkExpeditionsTick() {
  const now = Date.now();
  for (const id in state.expeditions) {
    const ex = state.expeditions[id];
    if (!ex.active) continue;
    if (now - ex.startTime >= ex.duration) {
      const e = EXPEDITIONS.find(x => x.id === id);
      const y = expYield(e);
      state.crys += y.crys; state.totalCrys += y.crys;
      state.scrap += y.scrap; state.totalScrap += y.scrap;
      let gotSing = false;
      if (y.sing && Math.random() < 0.2) {
        state.sing += y.sing; state.totalSing += y.sing;
        gotSing = true;
      }
      if (gotSing) toast(`Expedition: +${fmt(y.crys)} CRYS, +${y.sing} SING!`, 'gold');
      else toast(`Expedition: +${fmt(y.crys)} CRYS, +${fmt(y.scrap)} SCRAP`, 'green');
      state.expeditions[id] = { active: false };
      state.expeditionsHistory++;
      render();
    }
  }
}

// ===== AMBIENT AUDIO (procedural, no external files) =====
// Web Audio API generates a slow drone with subtle modulation
const audioCtl = {
  ctx: null, master: null, started: false, muted: false,
  oscs: [], lfos: [],
};

function initAudio() {
  if (audioCtl.ctx) return;
  try {
    audioCtl.ctx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtl.master = audioCtl.ctx.createGain();
    audioCtl.master.gain.value = 0.0001; // near-silent start, ramp from non-zero (iOS quirk)
    audioCtl.master.connect(audioCtl.ctx.destination);
  } catch (e) { console.warn('Audio init failed:', e); }
}

function startAmbient() {
  if (audioCtl.started || !audioCtl.ctx) return;
  audioCtl.started = true;
  const ctx = audioCtl.ctx;
  const now = ctx.currentTime;

  // Frequencies in the range phone speakers can actually reproduce (220Hz+)
  // A3 (220) + E4 (329.6) + A4 (440) + C#5 (554.4) — A major pad, audible everywhere
  const baseFreqs = [220, 329.63, 440, 554.37];
  const types = ['sine', 'sine', 'triangle', 'sine'];
  const gains = [0.22, 0.16, 0.10, 0.07];

  baseFreqs.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    osc.type = types[i];
    osc.frequency.value = freq;
    const oscGain = ctx.createGain();
    oscGain.gain.value = gains[i];

    // Slow LFO for subtle pitch modulation
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.07 + i * 0.04; // ~14-25s periods
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 1.5 + i * 0.5; // pitch wobble in cents
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    // Volume LFO too — gentle swell per voice
    const volLfo = ctx.createOscillator();
    volLfo.frequency.value = 0.04 + i * 0.025;
    const volLfoGain = ctx.createGain();
    volLfoGain.gain.value = gains[i] * 0.4;
    volLfo.connect(volLfoGain);
    volLfoGain.connect(oscGain.gain);

    // gentle lowpass for warmth
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 1800 + i * 600;
    filter.Q.value = 0.6;

    osc.connect(filter);
    filter.connect(oscGain);
    oscGain.connect(audioCtl.master);

    osc.start(now);
    lfo.start(now);
    volLfo.start(now);
    audioCtl.oscs.push(osc, lfo, volLfo);
  });

  // Fade in to comfortable volume — exponential ramp works better on iOS
  audioCtl.master.gain.cancelScheduledValues(now);
  audioCtl.master.gain.setValueAtTime(0.0001, now);
  audioCtl.master.gain.exponentialRampToValueAtTime(audioCtl.muted ? 0.0001 : 0.55, now + 2.0);
}

function toggleMute() {
  audioCtl.muted = !audioCtl.muted;
  if (audioCtl.ctx && audioCtl.master) {
    const now = audioCtl.ctx.currentTime;
    audioCtl.master.gain.cancelScheduledValues(now);
    audioCtl.master.gain.setValueAtTime(Math.max(0.0001, audioCtl.master.gain.value), now);
    audioCtl.master.gain.exponentialRampToValueAtTime(audioCtl.muted ? 0.0001 : 0.55, now + 0.4);
  }
  try { localStorage.setItem('voidminers:muted', audioCtl.muted ? '1' : '0'); } catch (e) {}
  const btn = document.getElementById('mute-btn');
  if (btn) btn.textContent = audioCtl.muted ? '♪ OFF' : '♪ ON';
}

// User-gesture-required: browsers block audio until first tap
function unlockAudioOnFirstGesture() {
  const handler = () => {
    initAudio();
    if (audioCtl.ctx && audioCtl.ctx.state === 'suspended') audioCtl.ctx.resume();
    startAmbient();
    document.removeEventListener('pointerdown', handler);
  };
  document.addEventListener('pointerdown', handler, { once: true });
  // Restore mute preference
  try {
    if (localStorage.getItem('voidminers:muted') === '1') audioCtl.muted = true;
  } catch (e) {}
}

// ===== ANOMALIES =====
function anomalyTick(dt) {
  if (era() < 3) return;
  if (state.pendingAnomaly && !state.inAnomalyFight) {
    if (Date.now() > state.pendingAnomaly.expiresAt) {
      state.pendingAnomaly = null;
      toast('ANOMALY FADED', 'bad');
      render();
    }
    return;
  }
  if (state.pendingAnomaly || state.inAnomalyFight) return;
  state.anomalyAcc += dt;
  const interval = 600 / (1 + 0.25 * (state.meta.anchance || 0));
  if (state.anomalyAcc >= interval) {
    state.anomalyAcc = 0;
    spawnAnomaly();
  }
}
function spawnAnomaly() {
  const t = ANOMALY_TYPES[Math.floor(Math.random() * ANOMALY_TYPES.length)];
  state.pendingAnomaly = {
    typeId: t.id,
    expiresAt: Date.now() + t.duration * 1000,
    spawnedAt: Date.now()
  };
  toast(`★ ANOMALY DETECTED: ${t.name}`, 'violet');
  // auto-switch to anomaly tab if user is somewhere quiet
  render();
}
function startAnomalyFight() {
  if (!state.pendingAnomaly) return;
  const t = ANOMALY_TYPES.find(x => x.id === state.pendingAnomaly.typeId);
  if (!t || !t.isCombat) return;
  // anomaly boss HP: scaled to current player power
  const playerDPS = totalDPS();
  const targetTtk = 30 + Math.random() * 30; // 30-60 second fight
  const hp = Math.max(1000, playerDPS * targetTtk);
  state.inAnomalyFight = true;
  state.anomalyFightData = { typeId: t.id, bossName: t.bossName, originalHp: hp };
  state.enemyMaxHp = hp;
  state.enemyHp = hp;
  state.mode = 'combat';
  state.tab = 'combat';
  // dramatic entrance
  playBossEntrance(t.bossName, 'anomaly');
  toast(`⚔ FIGHTING ${t.bossName}`, 'violet');
  render();
}
function resolveAnomaly(choiceIdx) {
  if (!state.pendingAnomaly) return;
  const t = ANOMALY_TYPES.find(x => x.id === state.pendingAnomaly.typeId);
  if (!t) return;
  if (t.isCombat) {
    startAnomalyFight();
    return;
  }
  if (t.choices) {
    const choice = t.choices[choiceIdx];
    if (choice.val.dur) state.activeBuffs.push({ ...choice.val, expiresAt: Date.now() + choice.val.dur * 1000 });
    toast(`Quantum Storm: ${choice.label} active!`, 'violet');
  } else if (t.instantReward) {
    if (t.instantReward.type === 'oreTime') {
      const gain = totalRate() * t.instantReward.val;
      state.ore += gain; state.totalOre += gain;
      toast(`+${fmt(gain)} ORE from rift!`, 'violet');
    } else if (t.instantReward.type === 'crys') {
      const gain = Math.max(1, Math.floor(Math.sqrt(state.totalOre / 1000)));
      state.crys += gain; state.totalCrys += gain;
      toast(`+${fmt(gain)} CRYS from cache!`, 'violet');
    }
  }
  state.pendingAnomaly = null;
  render();
}
function buffsTick() {
  const now = Date.now();
  state.activeBuffs = state.activeBuffs.filter(b => b.expiresAt > now);
}

// ===== ERA / META =====
function buyEra() {
  const next = state.erasUnlocked + 1;
  const eraData = ERAS.find(e => e.id === next);
  if (!eraData || state.dm < eraData.cost) return;
  state.dm -= eraData.cost;
  state.erasUnlocked = next;
  if (next === 1) state.autos.buyMiners = true;
  if (next === 2) state.autos.buyWeapons = true;
  showEraUnlockModal(eraData);
  applyEraTheme();
  render();
}
function showEraUnlockModal(eraData) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  let features = '';
  if (eraData.id === 1) features = '+ Auto-buy miners (3 strategies)<br>+ EXPEDITIONS — send fleets for Crystals<br>+ 2 new META upgrades';
  else if (eraData.id === 2) features = '+ Auto-buy weapons<br>+ Auto-Refine when ready<br>+ RESEARCH tree (12 nodes, 3 paths)<br>+ AI Tutor META';
  else if (eraData.id === 3) features = '+ Auto-Warp<br>+ ANOMALIES (4 event types, including combat)<br>+ SINGULARITY FORGE on Ascend (9 modifiers)<br>+ Quantum Sensor META';
  else if (eraData.id === 4) features = '+ Auto-Ascend<br>+ True idle endgame<br>+ The universe runs itself';
  bg.innerHTML = `
    <div class="modal era">
      <div class="era-num-big">0${eraData.id}</div>
      <h2>// ${eraData.name.toUpperCase()}</h2>
      <p style="color:var(--violet);font-size:11px;letter-spacing:0.2em;margin:6px 0">/ ERA UNLOCKED /</p>
      <div class="feature-block">${features}</div>
      <button class="btn go ascend" id="modal-ok">PROCEED</button>
    </div>`;
  document.body.appendChild(bg);
  document.getElementById('modal-ok').addEventListener('click', () => bg.remove());
}

function applyEraTheme() {
  document.body.setAttribute('data-era', state.erasUnlocked);
}

function buyMeta(id) {
  const u = META.find(x => x.id === id);
  if (!u || (u.era && era() < u.era)) return;
  const owned = state.meta[id];
  if (owned >= u.max || state.dm < u.cost) return;
  state.dm -= u.cost;
  state.meta[id] = owned + 1;
  render();
}
function buyResearch(id) {
  if (era() < 2) return;
  if (state.research[id]) return;
  const node = RESEARCH.find(r => r.id === id);
  if (!node || node.prereq.some(p => !state.research[p])) return;
  const cost = Math.ceil(node.cost * (1 - 0.1 * (state.meta.rsdisc || 0)));
  if (state.sing < cost) return;
  state.sing -= cost;
  state.research[id] = true;
  toast(`RESEARCHED: ${node.name}`, 'gold');
  render();
}

// ===== MAIN TICK =====
function tick() {
  const now = Date.now();
  let dt = (now - state.lastTick) / 1000;
  if (dt < 0) dt = 0; if (dt > 5) dt = 5;
  state.lastTick = now;
  buffsTick();
  state.ore += totalRate() * dt; state.totalOre += totalRate() * dt;
  const dps = totalDPS();
  if (dps > 0) damageEnemy(dps * dt, false);
  if (era() >= 1) autoBuyTick(dt);
  autoPrestigeTick();
  checkExpeditionsTick();
  anomalyTick(dt);
  renderResources(); renderCombat();
  checkOnboarding();
}

function applyOffline() {
  const ol = state.meta.offline || 0;
  if (ol <= 0) return;
  const elapsed = Math.max(0, (Date.now() - state.lastSave) / 1000);
  if (elapsed < 30) return;
  const cap = 60 * 60 * 4 * ol;
  const eff = Math.min(elapsed, cap);
  const gain = totalRate() * eff * 0.5;
  if (gain <= 0) return;
  state.ore += gain; state.totalOre += gain;
  showOfflineModal(eff, gain);
}
function showOfflineModal(secs, gain) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h2>// SIGNAL RESTORED</h2>
      <p>Drones kept mining while offline.</p>
      <div class="reward">+ ${fmt(gain)} ORE</div>
      <p style="margin-bottom:14px">${fmtTime(secs)} @ 50% rate</p>
      <button class="btn go refine" id="modal-ok">CONTINUE</button>
    </div>`;
  document.body.appendChild(bg);
  document.getElementById('modal-ok').addEventListener('click', () => bg.remove());
}

let toastTimer;
function toast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (kind ? ' ' + kind : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}
function spawnPrestigeParticles(color, count) {
  const core = document.getElementById('core');
  const rect = core.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'prestige-particle';
    const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.5;
    const dist = 60 + Math.random() * 120;
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    el.style.background = color;
    el.style.boxShadow = '0 0 8px ' + color;
    el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    el.style.animationDelay = (Math.random() * 0.15) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
}
function checkAchievements() {
  for (const a of ACHIEVEMENTS) {
    if (state.achievements[a.id]) continue;
    try { if (a.check()) { state.achievements[a.id] = true; toast('\u2605 ' + a.name.toUpperCase(), 'green'); } } catch(e) {}
  }
}
function checkOnboarding() {
  if (state.onboardingStep >= 2) return;
  const hint = document.getElementById('onboard-hint');
  if (!hint) return;
  if (state.onboardingStep === 0) {
    if (state.totalOre === 0 && state.miners.drone === 0) {
      hint.style.display = 'flex';
    } else {
      hint.style.display = 'none';
      state.onboardingStep = 1;
    }
  }
  if (state.onboardingStep === 1 && state.miners.drone > 0) {
    state.onboardingStep = 2;
    toast('DRONES MINE AUTOMATICALLY — ORE/S SHOWS YOUR RATE', 'green');
  }
}
function spawnFloat(x, y, text, kind) {
  const el = document.createElement('div');
  el.className = 'float' + (kind ? ' ' + kind : '');
  el.textContent = text; el.style.left = x + 'px'; el.style.top = y + 'px';
  document.getElementById('core').appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ===== RENDER =====
// Set textContent only when value differs (avoids unnecessary DOM text node replacement)
function _setText(el, val) { if (el.textContent !== val) el.textContent = val; }

function renderResources() {
  _setText(document.getElementById('ore'), fmt(state.ore));
  _setText(document.getElementById('crys'), fmt(state.crys));
  _setText(document.getElementById('sing'), fmt(state.sing));
  _setText(document.getElementById('dm'), fmt(state.dm));
  _setText(document.getElementById('scrap'), fmt(state.scrap));
  _setText(document.getElementById('ops'), fmt(totalRate()) + '/s');
  _setText(document.getElementById('tier-text'), '// SECTOR ' + String(state.sector).padStart(2, '0') + ' // ERA ' + state.erasUnlocked);
  if (state.mode === 'mine') _setText(document.getElementById('tap-power'), '+' + fmt(tapPower()) + ' / TAP');
  else _setText(document.getElementById('tap-power'), fmt(tapDamage()) + ' DMG / TAP');
  const rc = document.getElementById('row-crys');
  const rs = document.getElementById('row-scrap');
  const ri = document.getElementById('row-sing');
  const rd = document.getElementById('row-dm');
  if (rc) rc.style.display = (state.totalCrys > 0 || state.refineCount > 0 || state.crys > 0) ? 'flex' : 'none';
  if (rs) rs.style.display = (state.totalScrap > 0 || state.kills > 0 || state.scrap > 0) ? 'flex' : 'none';
  if (ri) ri.style.display = (state.totalSing > 0 || state.warpCount > 0 || state.sing > 0) ? 'flex' : 'none';
  if (rd) rd.style.display = (state.dm > 0 || state.ascendCount > 0) ? 'flex' : 'none';
}

// Cache combat DOM refs to avoid repeated lookups
let _combatRefs = null;
let _lastCombatState = '';

function renderCombat() {
  if (!_combatRefs) {
    _combatRefs = {
      core: document.getElementById('core'),
      eInfo: document.getElementById('enemy-info'),
      hpBar: document.getElementById('hp-bar'),
      hpText: document.getElementById('hp-text'),
      dpsText: document.getElementById('dps-text'),
      enemyName: document.getElementById('enemy-name'),
      enemyTier: document.getElementById('enemy-tier'),
      hpFill: document.getElementById('hp-fill'),
    };
  }
  const { core, eInfo, hpBar, hpText, dpsText, enemyName, enemyTier, hpFill } = _combatRefs;

  if (state.mode === 'combat') {
    const enc = getCurrentEncounter();
    const isBoss = enc?.isBoss || false;
    const isAnom = enc?.isAnomaly || false;

    // Only toggle classes when combat state actually changes
    const combatKey = 'combat:' + isBoss + ':' + isAnom + ':' + (enc?.name || '');
    if (combatKey !== _lastCombatState) {
      _lastCombatState = combatKey;
      core.classList.add('combat-mode');
      core.classList.toggle('boss-fight', isBoss);
      core.classList.toggle('anomaly-fight', isAnom);
      eInfo.style.display = 'flex'; hpBar.style.display = 'block';
      hpText.style.display = 'block'; dpsText.style.display = 'block';
      if (enc) {
        enemyName.textContent = enc.name;
        enemyName.classList.toggle('boss', isBoss);
        enemyName.classList.toggle('anomaly', isAnom);
        let tierLabel = isAnom ? '\u26a1ANOMALY' : 'S' + enc.stageId + '\u00b7' + (isBoss ? 'BOSS' : 'W' + (state.currentEnemyIdx + 1));
        enemyTier.textContent = tierLabel;
      }
    }
    // Always update HP bar and DPS (fast textContent, no class changes)
    if (enc) {
      const pct = Math.max(0, Math.min(100, (state.enemyHp / state.enemyMaxHp) * 100));
      hpFill.style.width = pct + '%';
      const hpStr = fmt(Math.max(0, state.enemyHp)) + ' / ' + fmt(state.enemyMaxHp);
      if (hpText.textContent !== hpStr) hpText.textContent = hpStr;
      const dpsStr = fmt(totalDPS()) + ' DPS';
      if (dpsText.textContent !== dpsStr) dpsText.textContent = dpsStr;
    }
  } else {
    if (_lastCombatState !== 'mine') {
      _lastCombatState = 'mine';
      core.classList.remove('combat-mode', 'boss-fight', 'anomaly-fight');
      eInfo.style.display = 'none'; hpBar.style.display = 'none';
      hpText.style.display = 'none'; dpsText.style.display = 'none';
    }
  }
}

function renderTabs() {

    { id: 'meta',     label: 'META', cls: '' }
  ];
  let html = '';
  for (const t of tabs) {
    const locked = (t.minEra && era() < t.minEra) ||
                   (t.id === 'combat' && state.totalOre < 30 && state.kills === 0 && state.weapons.laser === 0) ||
                   (t.id === 'meta' && state.dm <= 0 && state.ascendCount === 0);
    let badge = '';
    if (t.id === 'prestige') {

      else if (wg > 0) badge = ' <span class="badge gold">+' + fmt(wg) + ' SING</span>';
      else if (rg > 0) badge = ' <span class="badge">+' + fmt(rg) + ' CRYS</span>';
    }
    if (t.id === 'achv') {
      const count = Object.keys(state.achievements).length;
      if (count > 0) badge = ' <span class="badge green">' + count + '/' + ACHIEVEMENTS.length + '</span>';
    }
    if (t.id === 'anomaly' && state.pendingAnomaly) badge = ' <span class="badge violet">★</span>';
    if (t.id === 'expedition' && Object.values(state.expeditions).some(e => e.active)) badge = ' <span class="badge green">●</span>';
    html += `<button class="tab ${t.cls} ${state.tab === t.id ? 'active' : ''} ${locked ? 'locked' : ''}" data-tab="${t.id}">${t.label}${badge}</button>`;
  }
  // Skip DOM rebuild if tabs haven't changed
  const tabsEl = document.getElementById('tabs');
  if (tabsEl._lastHtml === html) return;
  tabsEl._lastHtml = html;
  tabsEl.innerHTML = html;
  document.querySelectorAll('#tabs .tab').forEach(el => {
    el.addEventListener('click', () => {
      if (el.classList.contains('locked')) {

        const reasons = {
          combat: 'EARN 30 ORE OR BUY A WEAPON FIRST',
          expedition: 'UNLOCK ERA 1 TO ACCESS EXPEDITIONS',
          research: 'UNLOCK ERA 2 TO ACCESS RESEARCH',
          anomaly: 'UNLOCK ERA 3 TO ACCESS ANOMALIES',
          meta: 'ASCEND FIRST TO UNLOCK META'
        };
        toast(reasons[id] || 'LOCKED', 'bad');
        return;
      }
      state.tab = el.dataset.tab;
      if (state.tab === 'combat') {
        state.mode = 'combat';
        const btn = document.getElementById('mode-toggle');
        btn.textContent = 'COMBAT'; btn.classList.add('combat');
      } else if (state.tab === 'mine') {
        state.mode = 'mine';
        const btn = document.getElementById('mode-toggle');
        btn.textContent = 'MINING'; btn.classList.remove('combat');
      }
      render();

}

// Track which tab structure is currently in the DOM to avoid full rebuilds
let _panelTab = null;
let _panelStructureKey = '';

function renderPanel() {
  const panel = document.getElementById('panel');
  const tab = state.tab;

  // Compute a "structure key" — things that change the DOM structure
  // (tab, which items are unlocked, auto-buy on/off, strategy, buyAmount)
  // but NOT continuously changing values like ore/costs
  // Structure key: only things that add/remove DOM elements.
  // Miner/weapon visibility is based on previous tier owned > 0,
  // so track that as a stable list of visible item IDs.
  const visibleMiners = MINERS.filter((m,i) => i === 0 || state.miners[MINERS[i-1].id] > 0 || state.totalOre >= m.base / 2).map(m => m.id);
  const visibleWeapons = WEAPONS.filter(w => weaponUnlocked(w)).map(w => w.id);
  const structKey = JSON.stringify([
    tab, buyAmount,
    visibleMiners, visibleWeapons,
    state.autos.buyMiners, state.autos.buyWeapons,
    state.autos.buyMinersStrategy, state.autos.buyWeaponsStrategy,
    state.autos.refine, state.autos.warp, state.autos.ascend,
    state.erasUnlocked, state.sector,
    Object.keys(state.research), Object.keys(state.achievements).length,
    state.pendingAnomaly ? 1 : 0,
    Object.keys(state.expeditions).map(k => state.expeditions[k]?.active ? 1 : 0),
  ]);

  // Full rebuild only when structure changes (new tab, new unlock, setting toggle)
  if (structKey !== _panelStructureKey) {
    _panelStructureKey = structKey;
    let html;
    let attach;
    switch (tab) {
      case 'mine': html = renderMine(); attach = attachBuy; break;
      case 'combat': html = renderCombatPanel(); attach = attachWeapon; break;
      case 'expedition': html = renderExpeditions(); attach = attachExp; break;
      case 'research': html = renderResearch(); attach = attachResearch; break;
      case 'anomaly': html = renderAnomaly(); attach = attachAnom; break;
      case 'upgrade': html = renderStats(); break;
      case 'achv': html = renderAchievements(); break;
      case 'prestige': html = renderPrestige(); attach = attachPrestige; break;
      case 'meta': html = renderMeta(); attach = attachMeta; break;
      default: return;
    }
    panel.innerHTML = html;
    if (attach) attach();
  }

  // Fast path: update only dynamic text values without touching DOM structure
  _updatePanelValues(tab);
}

function _updatePanelValues(tab) {
  if (tab === 'mine') {
    // Update section title rate
    const sub = document.querySelector('#panel .section-title .sub');
    if (sub) _setText(sub, fmt(totalRate()) + '/s');
    // Update each miner row's cost, quantity, and affordability
    document.querySelectorAll('#panel [data-buy]').forEach(el => {
      const m = MINERS.find(x => x.id === el.dataset.buy);
      if (!m) return;
      const owned = state.miners[m.id];
      const bCount = buyAmount === 'max' ? maxAffordable(minerCost, m, owned, state.ore) : buyAmount;
      const bCost = bulkCost(minerCost, m, owned, bCount);
      const can = bCount > 0 && state.ore >= bCost;
      const out = m.rate * owned * globalMult() * (1 + bonusFromResearch('mineRate'));
      const label = buyAmount === 'max' ? (bCount > 0 ? 'x' + bCount : 'MAX') : (buyAmount > 1 ? 'x' + buyAmount : 'COST');
      // Update class without triggering layout
      const shouldBeAffordable = can ? 'affordable' : 'cant';
      if (el.classList.contains('affordable') !== can) {
        el.classList.toggle('affordable', can);
        el.classList.toggle('cant', !can);
      }
      const qtyEl = el.querySelector('.qty');
      if (qtyEl) _setText(qtyEl, 'OWNED ' + owned + ' \u00b7 ' + fmt(out) + '/s');
      const costEl = el.querySelector('.cost');
      if (costEl) _setText(costEl, fmt(bCost));
      const labelEl = el.querySelector('.label');
      if (labelEl) _setText(labelEl, label);
    });
  } else if (tab === 'combat') {
    // Update weapon rows similarly
    document.querySelectorAll('#panel [data-wpn]').forEach(el => {
      const w = WEAPONS.find(x => x.id === el.dataset.wpn);
      if (!w) return;
      const owned = state.weapons[w.id];
      const bCount = buyAmount === 'max' ? maxAffordable(weaponCost, w, owned, state.scrap) : buyAmount;
      const bCost = bulkCost(weaponCost, w, owned, bCount);
      const can = bCount > 0 && state.scrap >= bCost;
      const label = buyAmount === 'max' ? (bCount > 0 ? 'x' + bCount : 'MAX') : (buyAmount > 1 ? 'x' + buyAmount : 'COST');
      if (el.classList.contains('affordable') !== can) {
        el.classList.toggle('affordable', can);
        el.classList.toggle('cant', !can);
      }
      const costEl = el.querySelector('.cost');
      if (costEl) _setText(costEl, fmt(bCost));
      const labelEl = el.querySelector('.label');
      if (labelEl) _setText(labelEl, label);
    });
  } else if (tab === 'prestige') {
    const sub = document.querySelector('#panel .section-title .sub');
    if (sub) _setText(sub, fmt(state.ore) + ' ORE');
  }
  // Other tabs (research, expeditions, etc.) change infrequently — full rebuild is fine
}

function renderMine() {
  let html = `<div class="section-title">EXTRACTION FLEET<span class="sub">${fmt(totalRate())}/s</span></div>`;

        <button class="btn small" data-toggle-buy-miners style="border-color:${on?'var(--bad)':'var(--green)'};color:${on?'var(--bad)':'var(--green)'}">${on?'PAUSE':'RESUME'}</button>
      </div>
      <div class="strategy-chips">
        <span style="font-size:9px;color:var(--ink-dim);align-self:center;margin-right:4px">STRATEGY:</span>

  }
  let unlocked = 0;
  for (let i = 0; i < MINERS.length; i++) {
    const m = MINERS[i]; const owned = state.miners[m.id];
    const prevOwned = i === 0 ? 1 : state.miners[MINERS[i-1].id];
    const visible = i === 0 || prevOwned > 0 || state.totalOre >= m.base / 2;
    if (!visible) continue;
    unlocked = i;
    const bCount = buyAmount === 'max' ? maxAffordable(minerCost, m, owned, state.ore) : buyAmount;
    const bCost = bulkCost(minerCost, m, owned, bCount);
    const can = bCount > 0 && state.ore >= bCost;
    const out = m.rate * owned * globalMult() * (1 + bonusFromResearch('mineRate'));
    const label = buyAmount === 'max' ? (bCount > 0 ? 'x' + bCount : 'MAX') : (buyAmount > 1 ? 'x' + buyAmount : 'COST');

  return html;

  }

    let label;
    if (enc.isAnomaly) label = '<span style="color:var(--violet)">⚡ ANOMALY: ' + enc.name + '</span>';
    else if (enc.isBoss) label = '<span style="color:var(--gold)">⚠ ' + enc.name + '</span>';
    else label = '<span style="color:var(--crimson)">' + enc.name + '</span>';
    const sectorScale = Math.pow(1.8, state.sector - 1); const oreReward = Math.floor(enc.reward * sectorScale * 10 * (enc.isBoss ? 1 + 0.25*(state.meta.bossres||0) : 1));
    html += `<div style="font-size:10px;color:var(--ink-dim);margin-bottom:8px;line-height:1.6">

      ETA: <span style="color:var(--cyan)">${ttk === Infinity ? '∞' : ttk.toFixed(1) + 's'}</span>
    </div>`;
  }
  let hasShown = false;
  for (let i = 0; i < WEAPONS.length; i++) {
    const w = WEAPONS[i]; const unlocked = weaponUnlocked(w); const owned = state.weapons[w.id];

      break;
    }
    if (!unlocked) continue;
    hasShown = true;
    const bCount = buyAmount === 'max' ? maxAffordable(weaponCost, w, owned, state.ore) : buyAmount;

    const wpnMult = (1 + 0.25*(state.meta.wpndmg||0)) * (1 + bonusFromResearch('wpnDmg')) * globalMult();

      </div>
      <div class="buy"><div class="label">${label}</div><div class="cost">${fmt(bCost)}</div></div>
    </div>`;
  }
  html += `<div class="section-title combat" style="margin-top:14px">SECTOR PROGRESS<span class="sub">${state.kills} KILLS</span></div>`;

    const isCurrent = state.currentStage === stage.id && !cleared;

    if (cleared) { st = '✓ CLEARED'; sc = ''; }
    else if (isCurrent) { st = '◆ ACTIVE'; sc = ''; }
    else if (everCleared) { st = '↻ REPEAT'; sc = ''; }
    else { st = '✗ LOCKED'; sc = 'locked'; }
    html += `<div class="unlock ${sc}"><span>S${stage.id} · ${stage.name.toUpperCase()} → ${stage.boss.name}</span><span>${st}</span></div>`;
  }
  return html;
}

function renderExpeditions() {
  let html = `<div class="section-title exp">EXPEDITIONS<span class="sub">${state.expeditionsHistory} COMPLETED</span></div>`;

  for (const e of EXPEDITIONS) {
    const ex = state.expeditions[e.id];
    const active = ex && ex.active;
    const dur = expDuration(e);
    const yld = expYield(e);
    let progress = 0; let remaining = dur;
    if (active) {
      const elapsed = (Date.now() - ex.startTime) / 1000;
      progress = Math.min(100, (elapsed / dur) * 100);
      remaining = Math.max(0, dur - elapsed);
    }
    const canStart = state.miners.drone >= e.minerCost && !active;
    html += `<div class="expedition-card ${active ? 'ex-active' : ''}">
      <div class="ex-icon">${e.icon}</div>

function renderResearch() {

    { name: 'COMBAT', color: 'var(--crimson)' },
    { name: 'AUTOMATION', color: 'var(--green)' }
  ];
  for (const c of cols) html += `<div class="research-tree-col" style="color:${c.color}">${c.name}</div>`;
  for (let row = 0; row < 4; row++) {
    for (let col = 0; col < 3; col++) {
      const node = RESEARCH.find(r => r.col === col && r.row === row);
      if (!node) { html += '<div></div>'; continue; }
      const purchased = !!state.research[node.id];
      const prereqMet = node.prereq.every(p => state.research[p]);
      const cost = Math.ceil(node.cost * (1 - 0.1 * (state.meta.rsdisc||0)));

      const cls = purchased ? 'purchased' : (can ? 'affordable' : (prereqMet ? '' : 'locked'));
      html += `<div class="research-node ${cls}" data-rs="${node.id}">

// Render a "next tier" progress strip: shows current/needed with a thin bar
function renderNextTier(current, needed, nextGain, currentGain, color, unit) {
  const pct = Math.max(0, Math.min(100, (current / needed) * 100));
  const remaining = Math.max(0, needed - current);
  const willHave = currentGain + 1 > nextGain ? nextGain : nextGain;
  return `
    <div style="margin: 6px 0 8px; font-size: 10px; color: var(--ink-dim); letter-spacing: 0.05em">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span>Next +${nextGain - currentGain} at <span style="color:${color}">${fmt(needed)}</span> ${unit}</span>
        <span style="color:${color}">${fmt(remaining)} to go</span>
      </div>
      <div style="height: 4px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); position: relative">
        <div style="height: 100%; width: ${pct}%; background: ${color}; box-shadow: 0 0 6px ${color}; transition: width 0.3s ease"></div>
      </div>
    </div>`;
}

// ===== RENDER BATCHING =====
// Best practice for incremental games: coalesce all render calls into
// a single requestAnimationFrame to avoid redundant DOM rebuilds.
// Any code that changes state should call render() which just sets a flag.
// The actual DOM update happens once per frame.
let _renderScheduled = false;
let _saveDirty = false;

function _doRender() {
  _renderScheduled = false;
  renderResources(); renderTabs(); renderPanel(); renderCombat();
}

function render() {
  _saveDirty = true;
  if (!_renderScheduled) {
    _renderScheduled = true;
    requestAnimationFrame(_doRender);
  }
}

// ===== EVENTS =====
document.getElementById('core').addEventListener('pointerdown', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  if (state.mode === 'mine') {
    navigator.vibrate?.(10);
    const tp = tapPower();
    if (tp > 0) {
      state.ore += tp; state.totalOre += tp;
      spawnFloat(e.clientX - rect.left, e.clientY - rect.top, '+' + fmt(tp));
    }
  } else {
    navigator.vibrate?.(10);
    if (hasModifier('mfAuto')) return;
    const isCrit = Math.random() < critChance();
    const dmg = tapDamage() * (isCrit ? 3 : 1);
    spawnFloat(e.clientX - rect.left, e.clientY - rect.top, (isCrit?'CRIT ':'')+'-'+fmt(dmg), isCrit?'crit':'dmg');
    damageEnemy(dmg, true);
  }
  renderResources();
  if (state.tab === 'mine' || state.tab === 'combat') renderPanel();
});

document.getElementById('mode-toggle').addEventListener('click', (e) => {
  e.stopPropagation();
  state.mode = state.mode === 'mine' ? 'combat' : 'mine';
  const btn = document.getElementById('mode-toggle');
  if (state.mode === 'combat') { btn.textContent = 'COMBAT'; btn.classList.add('combat'); }
  else { btn.textContent = 'MINING'; btn.classList.remove('combat'); }
  render();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h2>// WIPE ALL DATA</h2>
      <p style="color:var(--bad)">Permanently delete ALL progress including Dark Matter, Eras, META, and Research?</p>
      <p>This cannot be undone.</p>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn" id="reset-cancel" style="flex:1">CANCEL</button>
        <button class="btn go combat" id="reset-confirm" style="flex:1">WIPE</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  document.getElementById('reset-cancel').addEventListener('click', () => bg.remove());
  document.getElementById('reset-confirm').addEventListener('click', async () => {
    bg.remove(); await wipe();
    state = freshState(); state.ore = startingOre(); spawnNextEnemy();
    applyEraTheme(); render(); toast('// MEMORY WIPED', 'bad');
  });
});

document.getElementById('export-btn').addEventListener('click', () => {
  exportSave();
});

document.getElementById('import-btn').addEventListener('click', () => {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h2>// IMPORT SAVE</h2>
      <p>Paste your save code below:</p>
      <textarea id="import-input" style="width:100%;height:80px;background:var(--bg);color:var(--ink);border:1px solid rgba(120,220,255,0.35);font-family:inherit;font-size:10px;padding:8px;margin:8px 0;resize:none;box-sizing:border-box"></textarea>
      <div style="display:flex;gap:8px">
        <button class="btn" id="import-cancel" style="flex:1">CANCEL</button>
        <button class="btn go refine" id="import-confirm" style="flex:1">IMPORT</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  document.getElementById('import-cancel').addEventListener('click', () => bg.remove());
  document.getElementById('import-confirm').addEventListener('click', () => {
    const code = document.getElementById('import-input').value;
    bg.remove();
    if (code && code.trim()) importSave(code);
  });
});

document.getElementById('mute-btn').addEventListener('click', toggleMute);

// Unlock audio after first user gesture (browser requirement)
unlockAudioOnFirstGesture();
// Restore mute label from saved preference
try {
  if (localStorage.getItem('voidminers:muted') === '1') {
    audioCtl.muted = true;
    const btn = document.getElementById('mute-btn');
    if (btn) btn.textContent = '♪ OFF';
  }
} catch (e) {}

(async function init() {
  // Identify user from Cloudflare Access JWT
  currentUser = getCFUser();

  // Try cloud load first, then localStorage fallback
  let loaded = false;
  if (currentUser) {
    try {
      const cloudState = await cloudLoad();
      if (cloudState) {
        const fresh = freshState();
        state = Object.assign(fresh, cloudState);
        for (const m of MINERS) if (state.miners[m.id] === undefined) state.miners[m.id] = 0;
        for (const w of WEAPONS) if (state.weapons[w.id] === undefined) state.weapons[w.id] = 0;
        for (const m of META) if (state.meta[m.id] === undefined) state.meta[m.id] = 0;
        if (!state.achievements) state.achievements = {};
        if (!state.autos) state.autos = fresh.autos;
        loaded = true;
      }
    } catch(e) { console.warn('Cloud load failed, trying local:', e); }
  }

  if (!loaded) loaded = await load();

  if (loaded) {
    applyOffline();
    if (!state.enemyMaxHp) spawnNextEnemy();
  } else {
    state.ore = startingOre(); spawnNextEnemy();
  }
  state.lastTick = Date.now();
  applyEraTheme();
  render();
  setTimeout(() => {
    const splash = document.getElementById('splash');
    if (splash) { splash.classList.add('fade-out'); setTimeout(() => splash.remove(), 400); }
  }, 300);
  setInterval(tick, 100);
  setInterval(() => { if (_saveDirty) { _saveDirty = false; save(); } }, 5000);
  // Periodic checks — achievements and gentle render refresh
  setInterval(() => {
    checkAchievements();
    render();  // coalesced via rAF — no flicker
  }, 1000);
  document.getElementById('status').textContent = currentUser
    ? '// ' + currentUser.email.toUpperCase()
    : '// LOCAL MODE';
})();

window.addEventListener('pagehide', () => { save(); if (currentUser) cloudSave(); });
document.addEventListener('visibilitychange', () => { if (document.hidden) { save(); if (currentUser) cloudSave(); } });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>

</body>
